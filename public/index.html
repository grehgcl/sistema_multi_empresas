<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <title>Barbearia Pro</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- CSS Principal -->
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div id="loginContainer" class="container">
        <div class="box">
            <h2>Login</h2>
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginSenha" placeholder="Senha">
            <button onclick="fazerLogin()">Entrar</button>
            <div class="link" onclick="mostrarCadastro()">Não tem conta? Cadastre-se</div>
            <div id="loginMessage" class="error"></div>
        </div>
    </div>

    <div id="cadastroContainer" class="container" style="display:none">
        <div class="box">
            <h2>Cadastro de Barbearia</h2>
            <input type="text" id="cadastroNome" placeholder="Seu nome">
            <input type="email" id="cadastroEmail" placeholder="Email">
            <input type="password" id="cadastroSenha" placeholder="Senha">
            <input type="text" id="cadastroEmpresa" placeholder="Nome da barbearia">
            <button onclick="fazerCadastro()">Cadastrar</button>
            <div class="link" onclick="mostrarLogin()">Já tem conta? Faça login</div>
            <div id="cadastroMessage" class="error"></div>
        </div>
    </div>

    <div id="app" class="app">
        <div class="header">
            <h2>✂️ Barbearia Pro</h2>
            <div>
                <span id="userBadge"></span>
                <span id="userName"></span>
                <button onclick="logout()" style="margin-left:15px;">Sair</button>
            </div>
        </div>
        <div class="sidebar" id="sidebar"></div>
        <div class="main">
            <div id="trialInfo" class="trial-info" style="display:none"></div>
            <div id="content"></div>
        </div>
    </div>

    <!-- Modais -->
    <div id="modalCliente" class="modal">
        <div class="modal-content">
            <h3>Novo Cliente</h3>
            <input type="text" id="clienteNome" placeholder="Nome">
            <input type="text" id="clienteTelefone" placeholder="Telefone">
            <input type="email" id="clienteEmail" placeholder="Email">
            <button onclick="salvarCliente()">Salvar</button>
            <button onclick="fecharModal('modalCliente')">Cancelar</button>
        </div>
    </div>

    <div id="modalAgendamento" class="modal">
        <div class="modal-content">
            <h3>Novo Agendamento</h3>
            <select id="agendamentoCliente"></select>
            <input type="date" id="agendamentoData">
            <input type="time" id="agendamentoHora">
            <input type="text" id="agendamentoServico" placeholder="Serviço">
            <input type="number" id="agendamentoValor" placeholder="Valor">
            <button onclick="salvarAgendamento()">Salvar</button>
            <button onclick="fecharModal('modalAgendamento')">Cancelar</button>
        </div>
    </div>

    <div id="modalEditarEmpresa" class="modal">
        <div class="modal-content">
            <h3>Editar Empresa</h3>
            <input type="text" id="editEmpresaNome" placeholder="Nome">
            <select id="editEmpresaPlano">
                <option value="trial">Trial</option>
                <option value="basico">Básico</option>
                <option value="premium">Premium</option>
            </select>
            <button onclick="salvarEdicaoEmpresa()">Salvar</button>
            <button onclick="fecharModal('modalEditarEmpresa')">Cancelar</button>
        </div>
    </div>

    <!-- Modal de Upgrade de Plano -->
    <div id="modalUpgrade" class="modal">
        <div class="modal-content">
            <h3>💎 Fazer Upgrade</h3>
            <div id="upgradeContent"></div>
            <div class="modal-buttons" style="margin-top:20px;">
                <button onclick="fecharModal('modalUpgrade')" class="btn-secondary">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- UI JS -->
    <script src="/js/ui.js"></script>

    <!-- Script principal -->
    <script>
        let token = null;
        let usuario = null;

        function mostrarCadastro() {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('cadastroContainer').style.display = 'flex';
        }

        function mostrarLogin() {
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('cadastroContainer').style.display = 'none';
        }

        async function fazerLogin() {
            const email = document.getElementById('loginEmail').value;
            const senha = document.getElementById('loginSenha').value;

            showLoading();

            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, senha })
            });
            const data = await res.json();

            hideLoading();

            if (data.success) {
                token = data.data.token;
                usuario = data.data.usuario;
                localStorage.setItem('token', token);
                localStorage.setItem('usuario', JSON.stringify(usuario));
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                document.getElementById('userName').innerHTML = '👋 ' + usuario.nome;

                if (usuario.role === 'superadmin') {
                    document.getElementById('userBadge').innerHTML = '<span class="badge-super">🔴 SUPER ADMIN</span>';
                } else if (usuario.role === 'profissional') {
                    document.getElementById('userBadge').innerHTML = '<span class="badge-profissional">🔵 PROFISSIONAL</span>';
                } else {
                    document.getElementById('userBadge').innerHTML = '<span class="badge-dono">🟠 DONO</span>';
                    if (usuario.dias_restantes && usuario.dias_restantes > 0) {
                        document.getElementById('trialInfo').style.display = 'block';
                        document.getElementById('trialInfo').innerHTML = '⚠️ Período de teste: ' + usuario.dias_restantes + ' dias restantes. <a href="#" onclick="carregarPlanos()">Fazer upgrade →</a>';
                    }
                }

                carregarMenu();
                if (usuario.role === 'profissional') {
                    if (typeof carregarDashboardProfissional === 'function') {
                        carregarDashboardProfissional();
                    }
                } else {
                    if (typeof carregarDashboard === 'function') {
                        carregarDashboard();
                    }
                }
                showToast('Login realizado com sucesso!', 'success');
            } else {
                document.getElementById('loginMessage').innerHTML = data.message;
                showToast(data.message, 'error');
            }
        }

        async function fazerCadastro() {
            const nome = document.getElementById('cadastroNome').value;
            const email = document.getElementById('cadastroEmail').value;
            const senha = document.getElementById('cadastroSenha').value;
            const empresa_nome = document.getElementById('cadastroEmpresa').value;

            showLoading();

            const res = await fetch('/api/cadastro', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nome, email, senha, empresa_nome })
            });
            const data = await res.json();

            hideLoading();

            if (data.success) {
                document.getElementById('cadastroMessage').className = 'success';
                document.getElementById('cadastroMessage').innerHTML = data.message;
                showToast(data.message, 'success');
                setTimeout(() => mostrarLogin(), 2000);
            } else {
                document.getElementById('cadastroMessage').className = 'error';
                document.getElementById('cadastroMessage').innerHTML = data.message;
                showToast(data.message, 'error');
            }
        }

        function logout() {
            localStorage.clear();
            showToast('Logout realizado com sucesso!', 'info');
            setTimeout(() => location.reload(), 500);
        }

        function carregarMenu() {
            const sidebar = document.getElementById('sidebar');
            let botoes = [];

            if (usuario.role === 'superadmin') {
                botoes = [
                    { id: 'dashboard', nome: 'Dashboard', icone: 'fa-chart-line', funcao: 'carregarDashboard' },
                    { id: 'empresas', nome: 'Empresas', icone: 'fa-building', funcao: 'carregarEmpresas' },
                    { id: 'financeiro', nome: 'Financeiro Global', icone: 'fa-globe', funcao: 'carregarFinanceiroGlobal' }
                ];
            } else if (usuario.role === 'profissional') {
                botoes = [
                    { id: 'dashboard', nome: 'Dashboard', icone: 'fa-chart-line', funcao: 'carregarDashboardProfissional' },
                    { id: 'agendamentos', nome: 'Meus Agendamentos', icone: 'fa-calendar-alt', funcao: 'carregarAgendamentosProfissional' },
                    { id: 'financeiro', nome: 'Minhas Comissões', icone: 'fa-coins', funcao: 'carregarFinanceiro' }
                ];
            } else {
                botoes = [
                    { id: 'dashboard', nome: 'Dashboard', icone: 'fa-chart-line', funcao: 'carregarDashboard' },
                    { id: 'agendamentos', nome: 'Agendamentos', icone: 'fa-calendar-alt', funcao: 'carregarAgendamentos' },
                    { id: 'servicos', nome: 'Serviços', icone: 'fa-cut', funcao: 'carregarServicos' },
                    { id: 'financeiro', nome: 'Financeiro', icone: 'fa-chart-simple', funcao: 'carregarFinanceiro' },
                    { id: 'clientes', nome: 'Clientes', icone: 'fa-users', funcao: 'carregarClientes' },
                    { id: 'configuracoes', nome: 'Configurações', icone: 'fa-gear', funcao: 'carregarConfiguracoes' },
                    { id: 'planos', nome: '💎 Planos', icone: 'fa-gem', funcao: 'carregarPlanos' }
                ];
            }

            sidebar.innerHTML = botoes.map(b => `<button onclick="${b.funcao}()" id="btn${b.id}"><i class="fas ${b.icone}"></i> ${b.nome}</button>`).join('');
        }

        function ativarBotao(id) {
            document.querySelectorAll('.sidebar button').forEach(btn => btn.classList.remove('active'));
            const btn = document.getElementById('btn' + id);
            if (btn) btn.classList.add('active');
        }

        function fecharModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        // Carregar os módulos das páginas
        const scripts = [
            '/js/pages/dashboard.js',
            '/js/pages/dashboard-profissional.js',
            '/js/pages/clientes.js',
            '/js/pages/agendamentos.js',
            '/js/pages/agendamentos-profissional.js',
            '/js/pages/financeiro.js',
            '/js/pages/empresas.js',
            '/js/pages/configuracoes.js',
            '/js/pages/servicos.js',
            '/js/pages/planos.js'
        ];

        scripts.forEach(src => {
            const script = document.createElement('script');
            script.src = src;
            document.head.appendChild(script);
        });

        setTimeout(function () {
            if (typeof carregarDashboard !== 'undefined') window.carregarDashboard = carregarDashboard;
            if (typeof carregarDashboardProfissional !== 'undefined') window.carregarDashboardProfissional = carregarDashboardProfissional;
            if (typeof carregarClientes !== 'undefined') window.carregarClientes = carregarClientes;
            if (typeof carregarAgendamentos !== 'undefined') window.carregarAgendamentos = carregarAgendamentos;
            if (typeof carregarAgendamentosProfissional !== 'undefined') window.carregarAgendamentosProfissional = carregarAgendamentosProfissional;
            if (typeof carregarFinanceiro !== 'undefined') window.carregarFinanceiro = carregarFinanceiro;
            if (typeof carregarFinanceiroGlobal !== 'undefined') window.carregarFinanceiroGlobal = carregarFinanceiroGlobal;
            if (typeof carregarEmpresas !== 'undefined') window.carregarEmpresas = carregarEmpresas;
            if (typeof carregarConfiguracoes !== 'undefined') window.carregarConfiguracoes = carregarConfiguracoes;
            if (typeof carregarServicos !== 'undefined') window.carregarServicos = carregarServicos;
            if (typeof carregarPlanos !== 'undefined') window.carregarPlanos = carregarPlanos;
        }, 200);

        const savedToken = localStorage.getItem('token');
        const savedUsuario = localStorage.getItem('usuario');
        if (savedToken && savedUsuario) {
            token = savedToken;
            usuario = JSON.parse(savedUsuario);
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('userName').innerHTML = '👋 ' + usuario.nome;
            if (usuario.role === 'superadmin') {
                document.getElementById('userBadge').innerHTML = '<span class="badge-super">🔴 SUPER ADMIN</span>';
            } else if (usuario.role === 'profissional') {
                document.getElementById('userBadge').innerHTML = '<span class="badge-profissional">🔵 PROFISSIONAL</span>';
            } else {
                document.getElementById('userBadge').innerHTML = '<span class="badge-dono">🟠 DONO</span>';
            }
            carregarMenu();
            if (usuario.role === 'profissional') {
                setTimeout(function () {
                    if (typeof carregarDashboardProfissional === 'function') {
                        carregarDashboardProfissional();
                    }
                }, 300);
            } else {
                setTimeout(function () {
                    if (typeof carregarDashboard === 'function') {
                        carregarDashboard();
                    }
                }, 300);
            }
        }
    </script>
</body>

</html>
